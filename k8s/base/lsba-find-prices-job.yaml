apiVersion: batch/v1
kind: Job
metadata:
  name: lsba-find-prices-job
  namespace: lsba-ns
spec:
  backoffLimit: 2 # 2 tentatives max en cas d'echec  
  template:
    spec:
      volumes:
        - name: project-volume
          persistentVolumeClaim:
            claimName: lsba-pvc
      initContainers:
          # pour les tests, il faut un container d'attente pour conserver la logique : on récupère les livre et ensuite on recherche leurs prix
          # le plus simple est d'utiliser un timer car on connait le temps d'execution de find_books.py
        - image: alpine
          name: wait-for-find-books-ends
          command: 
          - "sh"
          - "-c"
          - "sleep 70"
      containers:
        - image: loup-solitaire-book-analyser:v0.1.3
          name: lsba-find-prices
          args: ["src/find_prices.py"]
          envFrom:
            - configMapRef:
                name: lsba-cm
                optional: false
          volumeMounts:
            - name: project-volume
              mountPath: /app/data
              subPath: data
            - name: project-volume
              mountPath: /app/logs
              subPath: logs
          resources:
            limits:
              # playwright semble au max avoir besoin de ~800Mi de mémoire et ~1.6 de cpu
              memory: "1Gi"
              cpu: "2"
            requests:
              # playwright necessite au moins 500Mi de mémoire et ~0.5 cpu au min
              memory: "500Mi"
              cpu: "0.5"
      restartPolicy: Never # on veut un nouveau pod en cas d'echec pour analyser les erreurs (tous les logs ne vont pas forcément dans les fichers logs du PVC)
