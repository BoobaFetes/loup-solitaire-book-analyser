name: CI

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  validate-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Type check
        run: pyright src

      - name: Lint
        run: ruff check src

      - name: Test
        run: pytest
